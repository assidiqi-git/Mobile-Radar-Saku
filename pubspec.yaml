name: mobile_radar_saku
description: "Radar Saku - Personal Financial Tracking App"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  http: ^1.6.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  path: ^1.9.0
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2
  ulid: ^2.0.1
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_icons:
  android: true       # Set true untuk membuat icon Android
  ios: true           # Set true untuk membuat icon iOS
  image_path: "assets/icon_tanpa_bg.png" # Path menuju gambar icon Anda
  
  # Opsional: Jika Anda ingin background warna khusus untuk Android 8.0+ (Adaptive Icons)
  adaptive_icon_background: "#0A192F"
  # adaptive_icon_foreground: "assets/icon_aplikasi_foreground.png"